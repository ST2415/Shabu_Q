<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Kiosk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <h2>🧍‍♂️ Customer Kiosk</h2>
            <a href="index.html"><button class="danger">Back to Home</button></a>
        </div>
        
        <div class="form-group">
            <label>1. Select Shabu Set:</label>
            <select id="shabu-set">
                <option value="Normal">Normal Shabu Set</option>
                <option value="Premium">Premium Shabu Set</option>
                <option value="Seafood">Seafood Shabu Set</option>
            </select>
        </div>
        <div class="form-group">
            <label>2. Select Table Type:</label>
            <select id="table-type">
                <option value="Single">Single Table (1-2 persons)</option>
                <option value="Family">Family Table (3-6 persons)</option>
            </select>
        </div>
        
        <button class="success" style="width: 100%; font-size: 18px;" onclick="getQueue()">Get Queue Ticket</button>

        <div id="ticket-result" class="hidden" style="background: var(--secondary-color); border: 2px dashed var(--primary-color); padding: 20px; text-align: center; border-radius: 8px; margin-top: 20px;">
            <h3 style="margin: 0; color: var(--primary-color);">Your Queue Number</h3>
            <h1 id="ticket-number" style="font-size: 48px; margin: 10px 0;">-</h1>
            <p id="ticket-info" style="margin: 0;"></p>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
